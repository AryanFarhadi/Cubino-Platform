services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cubino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cubino}
      POSTGRES_DB: cubino
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubino"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 128m

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cubino
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-cubino12345}
    volumes:
      - minio:/data
    mem_limit: 256m

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://cubino:${POSTGRES_PASSWORD:-cubino}@postgres:5432/cubino
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      - server
    mem_limit: 512m

volumes:
  pgdata:
  minio:
