name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @cubino/shared build
      - run: pnpm --filter @cubino/server build
      - run: NEXT_PUBLIC_API_URL= NEXT_PUBLIC_WS_URL= pnpm --filter @cubino/web build

  backup-script:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Validate backup script exists
        run: test -f scripts/backup-db.sh
